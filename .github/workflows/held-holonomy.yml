name: Held holonomy

on:
  pull_request:
    paths:
      - "apf/held_holonomy.py"
      - "apf/_held_holonomy_*.py"
      - "apf/_module_manifest.py"
      - "apf/ie_atlas_verdict_pin.py"
      - "apf/ie_export_core_census.py"
      - "apf/ie_wall_shadow_census.py"
      - "artifacts/ie_atlas_export.json"
      - "REVIEWER_ATLAS.md"
      - "setup.py"
      - "tests/test_held_holonomy.py"
      - ".github/workflows/held-holonomy.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  exact-certificate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install APF and test dependencies
        run: python -m pip install --upgrade pip pytest sympy && python -m pip install -e .
      - name: Compile Held-holonomy modules
        run: python -m compileall -q apf/held_holonomy.py apf/_held_holonomy_*.py
      - name: Run JSON certificate
        run: python -m apf.held_holonomy
      - name: Run adversarial tests
        run: python -m pytest -q tests/test_held_holonomy.py
      - name: Verify registry and census wiring
        run: python verify_all.py --bank-audit
