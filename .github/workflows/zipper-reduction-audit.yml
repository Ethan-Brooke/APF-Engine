name: Zipper reduction audit candidate

on:
  push:
    branches:
      - "audit/zipper-reduction-v0.1"
    paths:
      - "apf/zipper_reduction.py"
      - "apf/zipper_reduction_frontier.py"
      - "apf/zipper_reflection_bridge.py"
      - "tests/test_zipper_reduction.py"
      - "tests/test_zipper_reduction_frontier.py"
      - "tests/test_zipper_reflection_bridge.py"
      - "docs/audits/ZIPPER_REDUCTION_AUDIT_PACKET_v0.1.md"
      - "docs/audits/ZIPPER_REDUCTION_FRONTIER_PROGRESS_v0.1.md"
      - "docs/audits/ZIPPER_REDUCTION_PAPER5_CROSSWALK_v0.1.md"
      - "docs/audits/ZIPPER_REDUCTION_PAPER5_CONJUGATED_EXCHANGE_LEMMA_v0.1.md"
      - "docs/audits/ZIPPER_OPERATIONAL_REFLECTION_BRIDGE_v0.1.md"
      - ".github/workflows/zipper-reduction-audit.yml"
  pull_request:
    branches:
      - "main"
    paths:
      - "apf/zipper_reduction.py"
      - "apf/zipper_reduction_frontier.py"
      - "apf/zipper_reflection_bridge.py"
      - "tests/test_zipper_reduction.py"
      - "tests/test_zipper_reduction_frontier.py"
      - "tests/test_zipper_reflection_bridge.py"
      - "docs/audits/ZIPPER_REDUCTION_AUDIT_PACKET_v0.1.md"
      - "docs/audits/ZIPPER_REDUCTION_FRONTIER_PROGRESS_v0.1.md"
      - "docs/audits/ZIPPER_REDUCTION_PAPER5_CROSSWALK_v0.1.md"
      - "docs/audits/ZIPPER_REDUCTION_PAPER5_CONJUGATED_EXCHANGE_LEMMA_v0.1.md"
      - "docs/audits/ZIPPER_OPERATIONAL_REFLECTION_BRIDGE_v0.1.md"
      - ".github/workflows/zipper-reduction-audit.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  exact-candidate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install APF and audit dependencies
        run: python -m pip install -q --upgrade pip pytest sympy && python -m pip install -q -e .
      - name: Compile zipper-reduction modules
        run: python -m compileall -q apf/zipper_reduction.py apf/zipper_reduction_frontier.py apf/zipper_reflection_bridge.py
      - name: Run exact moving-exchange certificate
        run: python -m apf.zipper_reduction
      - name: Diagnose and run operational-reflection bridge certificate
        run: |
          python - <<'PY'
          from apf import zipper_reflection_bridge as z
          rows = z.run_all()
          for name, row in rows.items():
              print(name, row["status"], row["fail_reasons"])
          if not all(row["passed"] for row in rows.values()):
              raise SystemExit(1)
          PY
          python -m apf.zipper_reflection_bridge
      - name: Run downstream frontier certificate
        run: python -m apf.zipper_reduction_frontier
      - name: Run adversarial tests
        run: python -m pytest -q tests/test_zipper_reduction.py tests/test_zipper_reflection_bridge.py tests/test_zipper_reduction_frontier.py
      - name: Confirm canonical bank remains unchanged
        run: python verify_all.py --bank-audit
