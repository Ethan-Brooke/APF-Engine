name: Zipper reduction audit candidate

on:
  push:
    branches:
      - "audit/zipper-reduction-v0.1"
    paths:
      - "apf/zipper_reduction.py"
      - "tests/test_zipper_reduction.py"
      - "docs/audits/ZIPPER_REDUCTION_AUDIT_PACKET_v0.1.md"
      - ".github/workflows/zipper-reduction-audit.yml"
  pull_request:
    branches:
      - "main"
    paths:
      - "apf/zipper_reduction.py"
      - "tests/test_zipper_reduction.py"
      - "docs/audits/ZIPPER_REDUCTION_AUDIT_PACKET_v0.1.md"
      - ".github/workflows/zipper-reduction-audit.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  exact-candidate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install APF and audit dependencies
        run: python -m pip install --upgrade pip pytest sympy && python -m pip install -e .
      - name: Compile zipper-reduction module
        run: python -m compileall -q apf/zipper_reduction.py
      - name: Run exact JSON certificate
        run: python -m apf.zipper_reduction
      - name: Run adversarial tests
        run: python -m pytest -q tests/test_zipper_reduction.py
      - name: Confirm canonical bank remains unchanged
        run: python verify_all.py --bank-audit
